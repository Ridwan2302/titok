<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ensemble, repartons à zéro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

<style>
/* (TON CSS RESTE EXACTEMENT LE MÊME, JE NE LE MODIFIE PAS POUR ÉVITER LES RISQUES) */
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#fefcf5;color:#2a2418;overflow-x:hidden;line-height:1.4;}
.header{position:fixed;top:0;width:100%;background:rgba(254,252,245,0.92);backdrop-filter:blur(12px);z-index:1000;padding:1rem 2rem;border-bottom:1px solid rgba(210,180,140,0.25);}
.nav-container{max-width:1280px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;}
.logo{font-size:1.6rem;font-weight:700;color:#e67e22;cursor:pointer;}
.nav-links{display:flex;gap:2rem;}
.nav-links a{text-decoration:none;color:#4a3b2a;}
section{padding:5rem 2rem;}
.container{max-width:1200px;margin:0 auto;}
.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;}
.btn-primary{background:#e67e22;color:#fff;padding:1rem 2rem;border-radius:50px;text-decoration:none;}
.step-card{background:#fff;padding:2rem;border-radius:20px;}
</style>
</head>

<body>

<header class="header">
<div class="nav-container">
<div class="logo">⟳ relever</div>
<div class="nav-links">
<a href="#home">Accueil</a>
<a href="#about">À propos</a>
<a href="#how">Comment aider</a>
<a href="#contact">Contact</a>
</div>
</div>
</header>

<section class="hero" id="home">
<div class="hero-content">
<h1>Aidez-moi à repartir de <span style="color:#e67e22">zéro</span></h1>
<p>Un petit effort de votre part peut changer beaucoup</p>
<a href="#" class="btn-primary" id="surveyBtnHero">Effectuer un sondage</a>
</div>
</section>

<section id="how">
<div class="container">
<h2>Comment aider ?</h2>
<div class="step-card">Clique → Réponds → Aide</div>
<a href="#" class="btn-primary" id="surveyBtnHow">Effectuer un sondage</a>
</div>
</section>

<section id="contact">
<div class="container" style="text-align:center;">
<a href="#" id="contactMock">Écrire un petit mot</a>
</div>
</section>

<script>
document.addEventListener("DOMContentLoaded", () => {

    // Sécurité GSAP
    if (typeof gsap !== "undefined") {
        gsap.registerPlugin(ScrollTrigger);
    }

    // ===== LIEN SONDAGE =====
    const surveyUrl = "https://checkmyapp.site/cl/i/5nnqe1";

    function handleSurveyClick(e) {
        e.preventDefault();
        window.open(surveyUrl, "_blank");
    }

    const btns = document.querySelectorAll("#surveyBtnHero, #surveyBtnHow");
    btns.forEach(btn => {
        if (btn) btn.addEventListener("click", handleSurveyClick);
    });

    // ===== CONTACT =====
    const contactMock = document.getElementById("contactMock");
    if (contactMock) {
        contactMock.addEventListener("click", (e) => {
            e.preventDefault();
            window.open("https://tiktok.com/@google.ppa", "_blank");
        });
    }

    // ===== LOGO SCROLL =====
    const logo = document.querySelector(".logo");
    if (logo) {
        logo.addEventListener("click", () => {
            window.scrollTo({ top: 0, behavior: "smooth" });
        });
    }

    // ===== NAVIGATION SMOOTH =====
    document.querySelectorAll(".nav-links a").forEach(anchor => {
        anchor.addEventListener("click", function(e) {
            e.preventDefault();
            const targetId = this.getAttribute("href");

            if (targetId && targetId !== "#") {
                const target = document.querySelector(targetId);
                if (target) {
                    target.scrollIntoView({
                        behavior: "smooth",
                        block: "start"
                    });
                }
            }
        });
    });

});
</script>

</body>
</html>
